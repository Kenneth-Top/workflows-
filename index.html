<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LLM 数据看板</title>
  <link rel="stylesheet" href="assets/site.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">AI Model Intelligence</p>
      <h1>LLM 数据看板</h1>
    </div>
    <nav class="tabs" aria-label="页面导航">
      <button class="tab active" data-view="cumulative">累计用量对比</button>
      <button class="tab" data-view="tokens">单模型 Tokens</button>
      <button class="tab" data-view="products">AI 产品测评</button>
      <button class="tab" data-view="datasets">数据文件</button>
    </nav>
  </header>

  <main>
    <section id="cumulative-view" class="view active">
      <div class="toolbar">
        <label>
          搜索模型
          <input id="cumulative-model-search" type="search" placeholder="输入模型名">
        </label>
        <label>
          观察窗口
          <select id="cumulative-day-window">
            <option value="all">全部天数</option>
            <option value="90">前 90 天</option>
            <option value="60">前 60 天</option>
            <option value="30">前 30 天</option>
            <option value="14">前 14 天</option>
          </select>
        </label>
      </div>

      <div class="checkbox-panel">
        <div class="checkbox-toolbar">
          <strong>选择模型</strong>
          <span id="cumulative-selected-count">已选择 0 个</span>
          <button id="select-visible-models" class="plain-button" type="button">勾选当前结果</button>
          <button id="clear-cumulative-models" class="plain-button" type="button">清空选择</button>
        </div>
        <div id="cumulative-model-list" class="checkbox-list"></div>
      </div>

      <div class="metrics">
        <div><span>对比模型数</span><strong id="cum-model-count">-</strong></div>
        <div><span>最长观察</span><strong id="cum-max-day">-</strong></div>
        <div><span>领先模型</span><strong id="cum-leader">-</strong></div>
        <div><span>领先累计</span><strong id="cum-leader-total">-</strong></div>
      </div>

      <div class="chart-wrap tall">
        <canvas id="cumulative-chart" aria-label="模型累计用量对比"></canvas>
      </div>

      <div class="table-head">
        <h2>新模型增长预警</h2>
      </div>
      <div id="alert-grid" class="alert-grid">
        <section class="alert-panel">
          <h3>增长过快</h3>
          <p id="fast-ramp-caption">-</p>
          <div id="fast-ramp-alerts"></div>
        </section>
        <section class="alert-panel">
          <h3>增长放缓</h3>
          <p id="slope-drop-caption">-</p>
          <div id="slope-drop-alerts"></div>
        </section>
      </div>

      <div class="table-head">
        <h2>累计数值明细</h2>
        <button id="download-cumulative" class="plain-button">下载当前对比</button>
      </div>
      <div class="table-wrap">
        <table id="cumulative-table">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section id="tokens-view" class="view">
      <div class="toolbar">
        <label>
          选择模型
          <select id="model-select"></select>
        </label>
        <label>
          搜索模型
          <input id="model-search" type="search" placeholder="输入模型名">
        </label>
        <label>
          时间范围
          <select id="range-select">
            <option value="all">全部</option>
            <option value="30">近 30 天</option>
            <option value="14">近 14 天</option>
            <option value="7">近 7 天</option>
          </select>
        </label>
      </div>

      <div class="metrics">
        <div><span>模型数据区间</span><strong id="metric-models">-</strong></div>
        <div><span>当前筛选区间</span><strong id="metric-range">-</strong></div>
        <div><span>最新日消耗</span><strong id="metric-latest">-</strong></div>
        <div><span>选段累计</span><strong id="metric-total">-</strong></div>
      </div>

      <div class="chart-wrap">
        <canvas id="token-chart" aria-label="模型 token 累计趋势"></canvas>
      </div>

      <div class="table-head">
        <h2>模型明细</h2>
        <button id="download-filtered" class="plain-button">下载当前数据</button>
      </div>
      <div class="table-wrap">
        <table id="token-table">
          <thead>
            <tr>
              <th>日期</th>
              <th>模型</th>
              <th>Total Tokens</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section id="products-view" class="view">
      <div class="toolbar">
        <label>
          厂商
          <select id="vendor-select"></select>
        </label>
        <label>
          产品
          <select id="product-select"></select>
        </label>
        <label>
          样本筛选
          <input id="sample-search" type="search" placeholder="搜索正文、账号、标签">
        </label>
      </div>

      <div class="filter-panel">
        <label>
          用户类型
          <select id="filter-user" multiple size="4"></select>
        </label>
        <label>
          地区
          <select id="filter-region" multiple size="4"></select>
        </label>
        <label>
          情绪
          <select id="filter-sentiment" multiple size="4"></select>
        </label>
        <label>
          场景
          <select id="filter-scene" multiple size="4"></select>
        </label>
        <label>
          夸赞指标
          <select id="filter-praise" multiple size="4"></select>
        </label>
        <label>
          竞品
          <select id="filter-competitor" multiple size="4"></select>
        </label>
      </div>
      <div class="filter-actions">
        <button id="reset-sample-filters" class="plain-button">清空筛选</button>
        <button id="download-samples" class="plain-button">下载筛选样本</button>
      </div>

      <div class="metrics">
        <div><span>样本数</span><strong id="sample-count">-</strong></div>
        <div><span>最近样本</span><strong id="sample-latest">-</strong></div>
        <div><span>主要情绪</span><strong id="sample-sentiment">-</strong></div>
        <div><span>竞品提及</span><strong id="sample-competitors">-</strong></div>
      </div>

      <div class="product-grid">
        <div>
          <h2>数据概览</h2>
          <div id="sample-bars" class="bars"></div>
          <div class="table-wrap compact">
            <table id="sample-table">
              <thead>
                <tr>
                  <th>时间</th>
                  <th>账号</th>
                  <th>情绪</th>
                  <th>主题</th>
                  <th>内容</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
        <div>
          <div class="table-head">
            <h2>最新版报告</h2>
            <a id="report-link" class="plain-link" href="#" target="_blank" rel="noreferrer">新窗口打开</a>
          </div>
          <iframe id="report-frame" title="AI 产品测评报告"></iframe>
        </div>
      </div>
    </section>

    <section id="datasets-view" class="view">
      <div class="download-list">
        <a href="history_database.csv" download>Token 历史数据 CSV</a>
        <a href="openrouter_pricing_provider_records.csv" download>OpenRouter 定价 CSV</a>
        <a href="openrouter_benchmark_records.csv" download>Benchmark 跑分 CSV</a>
        <a href="lmarena_leaderboard_records.csv" download>LMARENA 排行 CSV</a>
        <div id="product-downloads" class="download-list nested"></div>
      </div>
    </section>
  </main>

  <div id="toast" role="status" aria-live="polite">正在加载数据...</div>
  <script src="assets/site.js"></script>
</body>
</html>
